# ── WebSecure Scan Worker Deployment ─────────────────────────────
# These workers consume scan jobs from RabbitMQ and execute them.
# Scale independently from the API based on queue depth.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websecure-worker
  namespace: websecure
  labels:
    app: websecure-worker
    component: worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: websecure-worker
  template:
    metadata:
      labels:
        app: websecure-worker
        component: worker
    spec:
      terminationGracePeriodSeconds: 60  # Allow current scan to finish
      containers:
        - name: worker
          image: websecure/api:latest
          command: ["node", "src/worker.js"]
          envFrom:
            - configMapRef:
                name: websecure-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: websecure-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: websecure-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres...; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq...; sleep 2; done']
---
# ── Horizontal Pod Autoscaler for Workers ─────────────────────
# In production, you would use KEDA (keda.sh) to scale based on
# RabbitMQ queue depth instead of CPU. This is a fallback.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: websecure-worker-hpa
  namespace: websecure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: websecure-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
