# ── WebSecure API Server Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websecure-api
  namespace: websecure
  labels:
    app: websecure-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: websecure-api
  template:
    metadata:
      labels:
        app: websecure-api
        component: api
    spec:
      containers:
        - name: api
          image: websecure/api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: websecure-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: websecure-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: websecure-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres...; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq...; sleep 2; done']
---
apiVersion: v1
kind: Service
metadata:
  name: websecure-api
  namespace: websecure
spec:
  selector:
    app: websecure-api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
# ── Horizontal Pod Autoscaler for API ─────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: websecure-api-hpa
  namespace: websecure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: websecure-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
