# ── Frontend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websecure-frontend
  namespace: websecure
  labels:
    app: websecure-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websecure-frontend
  template:
    metadata:
      labels:
        app: websecure-frontend
        component: frontend
    spec:
      containers:
        - name: frontend
          image: websecure/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: websecure-frontend
  namespace: websecure
spec:
  selector:
    app: websecure-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# ── Ingress (HTTPS entrypoint) ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: websecure-ingress
  namespace: websecure
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: "websecure-api"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - websecure.io
        - "*.websecure.io"
      secretName: websecure-tls
  rules:
    - host: websecure.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: websecure-api
                port:
                  number: 3001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websecure-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: websecure-frontend
                port:
                  number: 80
    # Wildcard for multi-tenant subdomains (e.g., acme.websecure.io)
    - host: "*.websecure.io"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: websecure-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: websecure-frontend
                port:
                  number: 80
